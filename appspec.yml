version: 0.0
os: linux

files:
  - source: backend/build/libs
    destination: /home/ec2-user/app

permissions:
  - object: /home/ec2-user/app
    pattern: '**'
    mode: 755
    owner: ec2-user
    group: ec2-user
    type:
      - file
      - directory

hooks:
  ApplicationStart:
    - location: deploy-scripts/application-start-hook.sh
      timeout: 300
      runas: ec2-user
      